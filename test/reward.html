<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward unlocked</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
      color: #fff;
      text-align: center;
    }
    .card {
      padding: 2rem 3rem;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
    p { margin: 0; opacity: 0.9; }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Reward unlocked</h1>
    <p>You completed all tasks. This is the reward page.</p>
    <p style="margin-top: 1rem;"><a href="index.html">← Back to test</a> · <a href="/install.html">Install</a></p>
  </div>
  <script>
    (function () {
      if (window.location.search.indexOf('unlocked=1') >= 0) {
        try {
          var raw = localStorage.getItem('bds');
          var state = raw ? JSON.parse(raw) : {};
          state.rewardUnlocked = true;
          localStorage.setItem('bds', JSON.stringify(state));
          if (window.history && window.history.replaceState) {
            window.history.replaceState({}, '', window.location.pathname);
          }
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
